<!DOCTYPE html>
<html>
<head>
    <title>测试SillyTavern配置</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .config-item { margin: 10px 0; }
        label { display: inline-block; width: 150px; font-weight: bold; }
        .value { color: #0066cc; }
        .error { color: red; }
        .success { color: green; }
        button { padding: 8px 16px; margin: 5px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>SillyTavern配置测试</h1>
    
    <div class="section">
        <h2>当前localStorage配置</h2>
        <div id="currentConfig"></div>
        <button onclick="loadConfig()">重新加载配置</button>
    </div>
    
    <div class="section">
        <h2>测试API连接</h2>
        <div class="config-item">
            <label>API地址:</label>
            <input type="text" id="apiUrl" value="https://sunlea.de/v1" style="width: 300px;">
        </div>
        <div class="config-item">
            <label>API密钥:</label>
            <input type="password" id="apiKey" placeholder="输入API密钥" style="width: 300px;">
        </div>
        <div class="config-item">
            <label>代理:</label>
            <input type="text" id="proxyUrl" value="http://127.0.0.1:10808" style="width: 300px;">
        </div>
        <button onclick="testAPI()">测试API连接</button>
        <button onclick="getModels()">获取模型列表</button>
    </div>
    
    <div id="result"></div>
    
    <script>
        // 加载当前配置
        function loadConfig() {
            const config = localStorage.getItem('sillytavern-settings');
            const container = document.getElementById('currentConfig');
            
            if (!config) {
                container.innerHTML = '<div class="error">未找到配置</div>';
                return;
            }
            
            try {
                const settings = JSON.parse(config);
                let html = '<div class="config-item"><label>后端:</label><span class="value">' + (settings.api?.activeProvider || '未设置') + '</span></div>';
                html += '<div class="config-item"><label>OpenAI URL:</label><span class="value">' + (settings.api?.openaiUrl || '未设置') + '</span></div>';
                html += '<div class="config-item"><label>OpenAI密钥:</label><span class="value">' + (settings.api?.openaiKey ? '已设置' : '未设置') + '</span></div>';
                html += '<div class="config-item"><label>代理:</label><span class="value">' + (settings.api?.proxyUrl || '未设置') + '</span></div>';
                html += '<div class="config-item"><label>自动保存:</label><span class="value">' + (settings.storage?.autoSave ? '开启' : '关闭') + '</span></div>';
                
                container.innerHTML = html;
            } catch (e) {
                container.innerHTML = '<div class="error">解析配置失败: ' + e.message + '</div>';
            }
        }
        
        // 测试API连接
        async function testAPI() {
            const apiUrl = document.getElementById('apiUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const proxyUrl = document.getElementById('proxyUrl').value;
            
            if (!apiKey) {
                showResult('错误', '请输入API密钥', 'error');
                return;
            }
            
            showResult('测试中', '正在测试API连接...', '');
            
            try {
                // 使用fetch测试API
                const response = await fetch(apiUrl + '/models', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + apiKey,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showResult('成功', 'API连接成功！响应: ' + JSON.stringify(data), 'success');
                } else {
                    showResult('失败', 'API返回错误: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                showResult('错误', '请求失败: ' + error.message, 'error');
            }
        }
        
        // 获取模型列表
        async function getModels() {
            const apiUrl = document.getElementById('apiUrl').value;
            const apiKey = document.getElementById('apiKey').value;
            const proxyUrl = document.getElementById('proxyUrl').value;
            
            if (!apiKey) {
                showResult('错误', '请输入API密钥', 'error');
                return;
            }
            
            showResult('获取中', '正在获取模型列表...', '');
            
            try {
                const response = await fetch(apiUrl + '/models', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + apiKey,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                if (response.ok && data.models) {
                    let html = '<div class="success">获取到 ' + data.models.length + ' 个模型:</div><ul>';
                    data.models.forEach(model => {
                        html += '<li>' + model.id + '</li>';
                    });
                    html += '</ul>';
                    showResult('成功', html, 'success');
                } else {
                    showResult('失败', '无法获取模型列表: ' + JSON.stringify(data), 'error');
                }
            } catch (error) {
                showResult('错误', '请求失败: ' + error.message, 'error');
            }
        }
        
        // 显示结果
        function showResult(title, message, type) {
            const resultDiv = document.getElementById('result');
            const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
            resultDiv.innerHTML = '<h3>' + title + '</h3><div class="' + className + '">' + message + '</div>';
        }
        
        // 页面加载时自动加载配置
        window.onload = loadConfig;
    </script>
</body>
</html>
