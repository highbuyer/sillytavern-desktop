<!DOCTYPE html>
<html>
<head>
    <title>直接测试你的配置</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1e1e2e; color: #e8e8e8; }
        pre { background: #2d2d44; padding: 15px; border-radius: 5px; overflow: auto; }
        button { background: #5B3FD9; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px 0; }
        button:hover { background: #6a5bff; }
        .success { color: #4CAF50; }
        .error { color: #F44336; }
        .warning { color: #FF9800; }
    </style>
</head>
<body>
    <h1>🔧 直接测试你的API配置</h1>
    
    <div>
        <button onclick="showConfig()">1. 显示当前配置</button>
        <button onclick="testAPI()">2. 测试API连接</button>
        <button onclick="clearResults()">3. 清空结果</button>
    </div>
    
    <div id="config" style="margin-top: 20px;"></div>
    <div id="result" style="margin-top: 20px;"></div>

    <script>
        function showConfig() {
            const settings = JSON.parse(localStorage.getItem('sillytavern-settings') || '{}');
            const api = settings.api || {};
            
            let html = '<h3>📋 当前配置:</h3>';
            html += '<pre>' + JSON.stringify({
                后端: api.activeProvider || '未设置',
                模型: api.activeModel || '未设置',
                OpenAI密钥: api.openaiKey ? '已填写 (' + api.openaiKey.substring(0, 10) + '...)' : '未填写',
                OpenAI地址: api.openaiUrl || '未设置',
                Claude密钥: api.claudeKey ? '已填写' : '未填写',
                OpenRouter密钥: api.openrouterKey ? '已填写' : '未填写',
                代理: api.proxyUrl || '未设置'
            }, null, 2) + '</pre>';
            
            document.getElementById('config').innerHTML = html;
        }
        
        async function testAPI() {
            const settings = JSON.parse(localStorage.getItem('sillytavern-settings') || '{}');
            const api = settings.api || {};
            
            if (!api.openaiKey) {
                document.getElementById('result').innerHTML = '<div class="error">❌ 错误: 未填写OpenAI API密钥</div>';
                return;
            }
            
            if (!api.openaiUrl) {
                document.getElementById('result').innerHTML = '<div class="error">❌ 错误: 未填写API地址</div>';
                return;
            }
            
            document.getElementById('result').innerHTML = '<div class="warning">⏳ 正在测试连接...</div>';
            
            const url = `${api.openaiUrl}/models`;
            const headers = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${api.openaiKey}`
            };
            
            console.log('测试URL:', url);
            console.log('使用密钥:', api.openaiKey.substring(0, 15) + '...');
            
            try {
                const response = await fetch(url, { headers });
                const text = await response.text();
                
                let result = `<h3>📡 API响应:</h3>`;
                result += `<div><strong>状态码:</strong> ${response.status} ${response.statusText}</div>`;
                result += `<div><strong>URL:</strong> ${url}</div>`;
                
                try {
                    const json = JSON.parse(text);
                    result += `<pre>${JSON.stringify(json, null, 2)}</pre>`;
                    
                    if (json.error) {
                        result += `<div class="error">❌ API错误: ${json.error.message || JSON.stringify(json.error)}</div>`;
                    } else if (json.data && Array.isArray(json.data)) {
                        result += `<div class="success">✅ 成功! 获取到 ${json.data.length} 个模型</div>`;
                        if (json.data.length > 0) {
                            result += '<h4>前5个模型:</h4><ul>';
                            json.data.slice(0, 5).forEach(model => {
                                result += `<li>${model.id} (${model.object || 'model'})</li>`;
                            });
                            result += '</ul>';
                        }
                    } else if (Array.isArray(json)) {
                        result += `<div class="success">✅ 成功! 获取到 ${json.length} 个模型</div>`;
                    } else {
                        result += `<div class="warning">⚠️ 未知的响应格式</div>`;
                    }
                } catch (e) {
                    result += `<div class="error">❌ JSON解析失败: ${e.message}</div>`;
                    result += `<pre>${text.substring(0, 500)}${text.length > 500 ? '...' : ''}</pre>`;
                }
                
                document.getElementById('result').innerHTML = result;
                
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="error">🔥 请求失败: ${error.message}</div>`;
            }
        }
        
        function clearResults() {
            document.getElementById('config').innerHTML = '';
            document.getElementById('result').innerHTML = '';
        }
        
        // 页面加载时自动显示配置
        window.onload = showConfig;
    </script>
</body>
</html>
