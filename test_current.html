<!DOCTYPE html>
<html>
<head>
    <title>测试当前页面配置</title>
    <style>
        body { font-family: monospace; padding: 20px; }
        pre { background: #f5f5f5; padding: 15px; border-radius: 5px; overflow: auto; }
        button { background: #007acc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 10px 0; }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <h1>测试当前SillyTavern页面配置</h1>
    
    <div>
        <button onclick="getCurrentConfig()">获取当前页面配置</button>
        <button onclick="testWithCurrentConfig()">使用当前配置测试API</button>
    </div>
    
    <div id="result" style="margin-top: 20px;"></div>

    <script>
        // 从当前SillyTavern页面获取配置
        function getCurrentConfig() {
            try {
                // 尝试从React状态获取
                const reactRoot = document.getElementById('root');
                if (reactRoot && reactRoot.__reactFiber) {
                    console.log('找到React根节点');
                }
                
                // 方法1: 尝试从全局变量获取
                let config = {};
                if (window.store && window.store.getState) {
                    config = window.store.getState();
                }
                
                // 方法2: 尝试从localStorage获取
                const localStorageConfig = localStorage.getItem('sillytavern-settings');
                
                // 方法3: 尝试从页面元素获取（模拟用户填写）
                const inputs = document.querySelectorAll('input[type="password"], input[type="text"]');
                let formData = {};
                inputs.forEach(input => {
                    if (input.value && input.placeholder) {
                        const key = input.placeholder.includes('sk-') ? 'apiKey' : 
                                   input.placeholder.includes('http') ? 'apiUrl' : 'other';
                        formData[key] = input.value;
                    }
                });
                
                document.getElementById('result').innerHTML = `
                    <h3>找到的配置:</h3>
                    <pre>全局store: ${config ? '存在' : '不存在'}</pre>
                    <pre>localStorage: ${localStorageConfig || '空'}</pre>
                    <pre>表单输入: ${JSON.stringify(formData, null, 2)}</pre>
                    <pre>所有输入框数量: ${inputs.length}</pre>
                `;
                
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="error">错误: ${error.message}</div>`;
            }
        }
        
        async function testWithCurrentConfig() {
            // 直接使用硬编码配置测试
            const testConfig = {
                apiUrl: 'https://sunlea.de/v1',
                apiKey: prompt('请输入你的API密钥:'),
                proxyUrl: 'http://127.0.0.1:10808'
            };
            
            if (!testConfig.apiKey) {
                alert('需要API密钥');
                return;
            }
            
            document.getElementById('result').innerHTML = '<div>正在测试...</div>';
            
            try {
                const url = `${testConfig.apiUrl}/models`;
                const headers = {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${testConfig.apiKey}`
                };
                
                console.log('测试:', url);
                
                const response = await fetch(url, { headers });
                const text = await response.text();
                
                let result = `<h3>API响应:</h3>`;
                result += `<div>状态: ${response.status} ${response.statusText}</div>`;
                
                try {
                    const json = JSON.parse(text);
                    result += `<pre>${JSON.stringify(json, null, 2)}</pre>`;
                    
                    if (json.error) {
                        result += `<div class="error">API错误: ${json.error.message}</div>`;
                    } else {
                        result += `<div class="success">✅ 连接成功!</div>`;
                    }
                } catch (e) {
                    result += `<div class="error">JSON解析失败: ${e.message}</div>`;
                    result += `<pre>${text}</pre>`;
                }
                
                document.getElementById('result').innerHTML = result;
                
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="error">请求失败: ${error.message}</div>`;
            }
        }
        
        // 自动尝试获取配置
        setTimeout(getCurrentConfig, 1000);
    </script>
</body>
</html>
